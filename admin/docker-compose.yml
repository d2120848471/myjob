services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: admin
    ports:
      - "3307:3306"
    volumes:
      - mysql_data_v1:/var/lib/mysql
      - ./manifest/sql:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

volumes:
  mysql_data_v1:
