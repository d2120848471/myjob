app_env: dev
server:
  address: ":8080"
database:
  driver: mysql
  dsn: "root:root123456@tcp(127.0.0.1:3307)/admin?charset=utf8mb4&parseTime=true&loc=Local"
redis:
  addr: "127.0.0.1:6380"
  password: ""
  db: 0
auth:
  jwt_secret: "please-change-this-secret"
  access_token_ttl_minutes: 10080
  temp_login_ttl_minutes: 5
trade:
  attempt_query_scan_interval_seconds: 30
  attempt_query_batch_size: 100
  attempt_query_max_backoff_seconds: 300
  open_nonce_ttl_seconds: 600
  open_timestamp_skew_seconds: 300
bootstrap:
  super_admin_username: "admin"
  super_admin_phone: "${SUPER_ADMIN_PHONE}"
  super_admin_password: "${SUPER_ADMIN_PASSWORD}"
sms:
  provider: aliyun
audit:
  async: false
  buffer_size: 16
upload:
  local_dir: "storage/uploads"
  public_prefix: "/uploads"
  max_image_size_mb: 2
